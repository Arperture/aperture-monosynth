<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aperture</title>
  <link rel="stylesheet" href="css/panel.css" />
</head>
<body>
  <div id="stage">
    <div id="unit-wrap">
      <!-- The whole instrument is one SVG, built by js/panel.js -->
      <svg id="unit" xmlns="http://www.w3.org/2000/svg"></svg>

      <!-- Preset / status strip (not part of the panel artwork) -->
      <div id="strip">
        <div class="strip-group">
          <span class="strip-label">PATCH</span>
          <select id="patch-lib" class="lib-sel" title="Patch library"></select>
          <select id="patch-slot" title="Patch slot (128 per library)"></select>
          <button id="patch-save" title="Name and save the current patch to this slot">Save</button>
          <button id="patch-load" title="Load the patch in this slot">Load</button>
          <button id="patch-clear" title="Clear this patch slot">Clear</button>
          <button id="patch-init" title="Reset panel to the init patch">Init</button>
        </div>
        <div class="strip-group" id="seq-bank">
          <span class="strip-label">SEQ</span>
          <select id="seq-banksel" class="lib-sel" title="Sequence bank"></select>
          <select id="seq-slot" title="Sequence slot (128 per bank)"></select>
          <button id="seq-save" title="Name and save the current sequence to this slot">Save</button>
          <button id="seq-load" title="Load the sequence in this slot">Load</button>
          <button id="seq-clear" title="Clear this sequence slot">Clear</button>
          <button id="seq-init" title="Clear the working sequence (click twice)">Init</button>
        </div>
        <div class="strip-group strip-right">
          <span id="kbd-hint">A–' play &nbsp;·&nbsp; Z/X oct <b id="octave-label">C2</b></span>
          <span id="midi-status"><i id="midi-led"></i><span id="midi-name">no MIDI device</span></span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
